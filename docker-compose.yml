services:

  frontend:
    build:
      context: ./services/frontend
    volumes:
      - frontend_data:/app/dist
    expose:
     - "3000"
    restart: "no"

  gateway:
    image: nginx:latest
    container_name: gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - frontend_data:/usr/share/nginx/html:ro
      - ./services/gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./services/gateway/site.conf:/etc/nginx/conf.d/default.conf:ro
      - ./.certs:/etc/nginx/certs:ro
    restart: "unless-stopped"
    depends_on:
      frontend:
        condition: service_completed_successfully

volumes:
  frontend_data:
